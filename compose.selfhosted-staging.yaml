services:
  postgres:
    image: postgres:16
    container_name: gymcrm-staging-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${STAGING_POSTGRES_DB:-gymcrm_staging}
      POSTGRES_USER: ${STAGING_POSTGRES_USER:-gymcrm}
      POSTGRES_PASSWORD: ${STAGING_POSTGRES_PASSWORD:?Set STAGING_POSTGRES_PASSWORD in environment (GitHub Environment secret recommended)}
      TZ: UTC
    volumes:
      - gymcrm-staging-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${STAGING_POSTGRES_USER:-gymcrm} -d ${STAGING_POSTGRES_DB:-gymcrm_staging}"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: gymcrm-staging-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gymcrm-staging-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-staging}
      PORT: 8080
      DB_URL: jdbc:postgresql://postgres:5432/${STAGING_POSTGRES_DB:-gymcrm_staging}
      DB_USERNAME: ${STAGING_POSTGRES_USER:-gymcrm}
      DB_PASSWORD: ${STAGING_POSTGRES_PASSWORD:?Set STAGING_POSTGRES_PASSWORD in environment}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      APP_REDIS_ENABLED: "true"
      APP_REDIS_STARTUP_REQUIRED: "false"
      # Default to JWT mode so `dev/staging` bootstrap seeder can create an initial admin user.
      APP_SECURITY_MODE: ${APP_SECURITY_MODE:-jwt}
      APP_PROTOTYPE_NO_AUTH_ENABLED: ${APP_PROTOTYPE_NO_AUTH_ENABLED:-false}
      APP_PROTOTYPE_ALLOWED_ORIGINS: ${APP_PROTOTYPE_ALLOWED_ORIGINS:-https://localhost,https://127.0.0.1}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/api/v1/health | grep -q '\"status\"'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s

  nginx:
    build:
      context: .
      dockerfile: deploy/selfhosted/nginx/Dockerfile
    container_name: gymcrm-staging-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      NGINX_HOSTNAME: ${STAGING_HOSTNAME}
    volumes:
      - type: volume
        source: gymcrm-staging-certbot-etc
        target: /etc/letsencrypt
        read_only: true
      - type: volume
        source: gymcrm-staging-certbot-webroot
        target: /var/www/certbot
        read_only: true
  certbot:
    image: certbot/certbot:latest
    container_name: gymcrm-staging-certbot
    restart: unless-stopped
    entrypoint:
      - /bin/sh
      - -c
    command:
      - trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet --deploy-hook "date +%s > /var/www/certbot/.certbot-reload"; sleep 43200; done
    volumes:
      - gymcrm-staging-certbot-etc:/etc/letsencrypt
      - gymcrm-staging-certbot-webroot:/var/www/certbot

volumes:
  gymcrm-staging-postgres-data:
  gymcrm-staging-certbot-etc:
  gymcrm-staging-certbot-webroot:
