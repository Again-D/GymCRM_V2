name: nightly-integration

on:
  workflow_dispatch: {}
  schedule:
    # 06:00 KST (UTC+9) = 21:00 UTC (previous day)
    - cron: "0 21 * * *"

permissions:
  contents: read
  issues: write

jobs:
  integration-test:
    name: nightly-integration
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout develop
        uses: actions/checkout@v4
        with:
          ref: develop

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Start DB/Redis (compose)
        run: |
          set -euo pipefail
          docker compose version
          docker compose -f compose.yaml up -d

          for name in gymcrm-postgres gymcrm-redis; do
            echo "Waiting for $name to become healthy..."
            for _ in {1..60}; do
              status="$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}unknown{{end}}' "$name" || true)"
              if [ "$status" = "healthy" ]; then
                echo "$name is healthy."
                break
              fi
              if [ "$status" = "unhealthy" ]; then
                echo "$name is unhealthy."
                docker logs "$name" || true
                exit 1
              fi
              sleep 2
            done
          done

      - name: Run integration tests
        working-directory: backend
        run: ./gradlew integrationTest --no-daemon

      - name: Teardown services
        if: always()
        run: docker compose -f compose.yaml down -v

  notify-on-failure:
    name: nightly-integration-notify
    runs-on: ubuntu-latest
    needs: [integration-test]
    if: failure()
    steps:
      - name: Create or update failure issue
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `https://github.com/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            const today = new Date().toISOString().slice(0, 10);
            const title = `Nightly integration failed (${today})`;
            const body = [
              `Nightly integration workflow failed.`,
              ``,
              `- Run: ${runUrl}`,
              `- Branch: develop`,
              `- SHA: ${process.env.GITHUB_SHA}`,
              ``,
              `Owner: please triage and fix on develop. This is a soft block (not a required PR check).`,
            ].join("\n");

            const { owner, repo } = context.repo;
            const search = await github.rest.search.issuesAndPullRequests({
              q: `repo:${owner}/${repo} is:issue is:open in:title "${title}"`,
            });

            if (search.data.total_count > 0) {
              const issue_number = search.data.items[0].number;
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
              core.info(`Commented on existing issue #${issue_number}`);
              return;
            }

            const issue = await github.rest.issues.create({
              owner,
              repo,
              title,
              body,
            });
            core.info(`Created issue #${issue.data.number}`);
