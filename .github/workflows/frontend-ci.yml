name: frontend-ci

on:
  pull_request:
    branches: [develop, main]

permissions:
  contents: read

jobs:
  frontend-ci:
    name: frontend-ci
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TZ: Asia/Seoul

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect frontend changes
        id: changes
        uses: tj-actions/changed-files@v46
        with:
          files: |
            frontend/**

      - name: Skip (no frontend changes)
        if: steps.changes.outputs.any_changed != 'true'
        run: echo "No frontend/** changes. Skipping frontend CI steps."

      - name: Set up Node.js
        if: steps.changes.outputs.any_changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        if: steps.changes.outputs.any_changed == 'true'
        working-directory: frontend
        run: npm ci

      - name: Build
        if: steps.changes.outputs.any_changed == 'true'
        working-directory: frontend
        run: npm run build

      - name: Test
        if: steps.changes.outputs.any_changed == 'true'
        working-directory: frontend
        run: npm test

      - name: Biome check (changed files only)
        if: steps.changes.outputs.any_changed == 'true'
        working-directory: frontend
        run: |
          set -euo pipefail

          changed_files_raw='${{ steps.changes.outputs.all_changed_files }}'
          changed_files="$(echo "$changed_files_raw" | tr ' ' '\n' | sed 's#^frontend/##')"

          biome_targets="$(echo "$changed_files" | grep -E '\\.(ts|tsx|js|jsx|json|css|scss)$' || true)"
          if [ -z "$biome_targets" ]; then
            echo "No Biome-targeted files changed."
            exit 0
          fi

          echo "Biome targets:"
          echo "$biome_targets"

          npx biome check --max-diagnostics=50 $biome_targets
