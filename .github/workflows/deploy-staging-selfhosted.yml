name: deploy-staging-selfhosted

on:
  push:
    branches: [develop]
  workflow_dispatch: {}

concurrency:
  group: staging-selfhosted-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: deploy
    runs-on: [self-hosted, windows, gymcrm-staging]
    timeout-minutes: 45
    environment: staging-selfhosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assert Windows runner
        shell: cmd
        run: |
          @echo off
          if not "%RUNNER_OS%"=="Windows" (
            echo This workflow must run on a Windows runner. Detected RUNNER_OS=%RUNNER_OS%
            exit /b 1
          )

      - name: Docker info
        shell: cmd
        run: |
          @echo off
          docker version
          docker compose version

      - name: Validate Certbot preflight
        shell: cmd
        env:
          STAGING_HOSTNAME: ${{ vars.STAGING_SELFHOSTED_HOSTNAME }}
          STAGING_CERTBOT_EMAIL: ${{ vars.STAGING_SELFHOSTED_CERTBOT_EMAIL }}
        run: |
          @echo off
          powershell -NoProfile -ExecutionPolicy Bypass -File .\docs\observability\tools\validate_selfhosted_staging_certbot_preflight.ps1

      - name: Deploy and issue Certbot certificate
        shell: cmd
        env:
          STAGING_POSTGRES_PASSWORD: ${{ secrets.STAGING_SELFHOSTED_POSTGRES_PASSWORD }}
          STAGING_HOSTNAME: ${{ vars.STAGING_SELFHOSTED_HOSTNAME }}
          STAGING_CERTBOT_EMAIL: ${{ vars.STAGING_SELFHOSTED_CERTBOT_EMAIL }}
          APP_PROTOTYPE_ALLOWED_ORIGINS: ${{ vars.STAGING_SELFHOSTED_ALLOWED_ORIGINS }}
        run: |
          @echo off
          REM Defensive: if the runner has COMPOSE_FILE / COMPOSE_PROJECT_NAME set globally,
          REM it can cause unexpected extra compose files/services to be included.
          set COMPOSE_FILE=
          set COMPOSE_PROJECT_NAME=

          if "%STAGING_POSTGRES_PASSWORD%"=="" (
            echo Missing secret: STAGING_SELFHOSTED_POSTGRES_PASSWORD ^(mapped to STAGING_POSTGRES_PASSWORD^)
            exit /b 1
          )

          if "%STAGING_HOSTNAME%"=="" (
            echo Missing variable: STAGING_SELFHOSTED_HOSTNAME ^(mapped to STAGING_HOSTNAME^). Set it in the staging-selfhosted GitHub Environment.
            exit /b 1
          )

          if "%STAGING_CERTBOT_EMAIL%"=="" (
            echo Missing variable: STAGING_SELFHOSTED_CERTBOT_EMAIL ^(mapped to STAGING_CERTBOT_EMAIL^). Set it in the staging-selfhosted GitHub Environment.
            exit /b 1
          )

          docker compose -p gymcrm-staging -f compose.selfhosted-staging.yaml up -d --build --remove-orphans postgres redis backend nginx certbot || exit /b 1
          docker compose -p gymcrm-staging -f compose.selfhosted-staging.yaml run --rm --entrypoint certbot certbot certonly --webroot -w /var/www/certbot --agree-tos --no-eff-email --non-interactive --keep-until-expiring --email "%STAGING_CERTBOT_EMAIL%" -d "%STAGING_HOSTNAME%" || exit /b 1
          docker compose -p gymcrm-staging -f compose.selfhosted-staging.yaml up -d --force-recreate nginx certbot || exit /b 1
          docker compose -p gymcrm-staging -f compose.selfhosted-staging.yaml ps || exit /b 1

      - name: Smoke test (/, /api/v1/health)
        shell: cmd
        env:
          STAGING_HOSTNAME: ${{ vars.STAGING_SELFHOSTED_HOSTNAME }}
        run: |
          @echo off
          powershell -NoProfile -ExecutionPolicy Bypass -File .\docs\observability\tools\validate_selfhosted_staging_https.ps1

      - name: Dump logs on failure
        if: failure()
        shell: cmd
        run: |
          @echo off
          docker ps -a --filter "name=gymcrm-staging-" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
          docker logs gymcrm-staging-nginx 2>NUL
          docker logs gymcrm-staging-certbot 2>NUL
          docker logs gymcrm-staging-backend 2>NUL
          docker logs gymcrm-staging-postgres 2>NUL
          docker logs gymcrm-staging-redis 2>NUL
