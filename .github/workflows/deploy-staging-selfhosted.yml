name: deploy-staging-selfhosted

on:
  push:
    branches: [develop]
  workflow_dispatch: {}

concurrency:
  group: staging-selfhosted-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: deploy
    runs-on: [self-hosted, windows, gymcrm-staging]
    timeout-minutes: 45
    environment: staging-selfhosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assert Windows runner
        shell: cmd
        run: |
          @echo off
          if not "%RUNNER_OS%"=="Windows" (
            echo This workflow must run on a Windows runner. Detected RUNNER_OS=%RUNNER_OS%
            exit /b 1
          )

      - name: Docker info
        shell: cmd
        run: |
          @echo off
          docker version
          docker compose version

      - name: Deploy (docker compose up --build)
        shell: cmd
        env:
          STAGING_POSTGRES_PASSWORD: ${{ secrets.STAGING_SELFHOSTED_POSTGRES_PASSWORD }}
          STAGING_HTTP_PORT: ${{ vars.STAGING_SELFHOSTED_HTTP_PORT }}
        run: |
          @echo off
          REM Defensive: if the runner has COMPOSE_FILE / COMPOSE_PROJECT_NAME set globally,
          REM it can cause unexpected extra compose files/services to be included.
          set COMPOSE_FILE=
          set COMPOSE_PROJECT_NAME=

          if "%STAGING_POSTGRES_PASSWORD%"=="" (
            echo Missing secret: STAGING_SELFHOSTED_POSTGRES_PASSWORD ^(mapped to STAGING_POSTGRES_PASSWORD^)
            exit /b 1
          )
          if "%STAGING_HTTP_PORT%"=="" (
            set STAGING_HTTP_PORT=8088
          )

          docker compose -p gymcrm-staging -f compose.selfhosted-staging.yaml up -d --build --remove-orphans
          docker compose -p gymcrm-staging -f compose.selfhosted-staging.yaml ps

      - name: Smoke test (/, /api/v1/health)
        shell: cmd
        env:
          STAGING_HTTP_PORT: ${{ vars.STAGING_SELFHOSTED_HTTP_PORT }}
        run: |
          @echo off
          if "%STAGING_HTTP_PORT%"=="" (
            set STAGING_HTTP_PORT=8088
          )

          set BASE_URL=http://localhost:%STAGING_HTTP_PORT%

          call :wait_for "%BASE_URL%/" 60 2 || exit /b 1
          call :wait_for "%BASE_URL%/api/v1/health" 60 2 || exit /b 1
          exit /b 0

          :wait_for
          set TARGET=%~1
          set RETRIES=%~2
          set SLEEP_SECS=%~3

          echo Waiting for %TARGET%
          for /l %%i in (1,1,%RETRIES%) do (
            curl -fsS "%TARGET%" >NUL 2>&1
            if not errorlevel 1 (
              exit /b 0
            )
            ping -n %SLEEP_SECS% 127.0.0.1 >NUL
          )
          echo Smoke check failed for %TARGET%
          exit /b 1

      - name: Dump logs on failure
        if: failure()
        shell: cmd
        run: |
          @echo off
          docker ps -a --filter "name=gymcrm-staging-" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
          docker logs gymcrm-staging-nginx 2>NUL
          docker logs gymcrm-staging-backend 2>NUL
          docker logs gymcrm-staging-postgres 2>NUL
          docker logs gymcrm-staging-redis 2>NUL
