spring:
  application:
    name: gymcrm-backend
  jackson:
    time-zone: UTC
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/gymcrm_dev}
    username: ${DB_USERNAME:gymcrm}
    password: ${DB_PASSWORD:gymcrm}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}
      connect-timeout: ${REDIS_CONNECT_TIMEOUT:2s}
      timeout: ${REDIS_COMMAND_TIMEOUT:2s}
      repositories:
        enabled: false
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  health:
    redis:
      enabled: ${APP_REDIS_ENABLED:false}
  metrics:
    tags:
      application: ${spring.application.name}
      environment: ${SPRING_PROFILES_ACTIVE:default}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      slo:
        http.server.requests: 100ms,250ms,500ms,1s

logging:
  pattern:
    level: "%5p [traceId:%X{traceId:-none}]"

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
    path: /swagger-ui
  paths-to-match: /api/v1/**
  paths-to-exclude: /actuator/**, /api/internal/**

app:
  access:
    qr:
      ttl-seconds: ${APP_ACCESS_QR_TTL_SECONDS:30}
  redis:
    enabled: ${APP_REDIS_ENABLED:false}
    startup-required: ${APP_REDIS_STARTUP_REQUIRED:false}
    qr-token-store:
      enabled: ${APP_REDIS_QR_TOKEN_STORE_ENABLED:false}
    reservation-lock:
      enabled: ${APP_REDIS_RESERVATION_LOCK_ENABLED:false}
      wait-time: ${APP_REDIS_RESERVATION_LOCK_WAIT_TIME:250ms}
      lease-time: ${APP_REDIS_RESERVATION_LOCK_LEASE_TIME:3s}
    crm-dispatch-claim:
      enabled: ${APP_REDIS_CRM_DISPATCH_CLAIM_ENABLED:false}
      lease-time: ${APP_REDIS_CRM_DISPATCH_CLAIM_LEASE_TIME:30s}
    settlement-dashboard-cache:
      enabled: ${APP_REDIS_SETTLEMENT_DASHBOARD_CACHE_ENABLED:false}
      ttl: ${APP_REDIS_SETTLEMENT_DASHBOARD_CACHE_TTL:30s}
    auth-denylist:
      enabled: ${APP_REDIS_AUTH_DENYLIST_ENABLED:false}
  security:
    mode: ${APP_SECURITY_MODE:prototype}
    pii:
      encryption-key: ${APP_SECURITY_PII_ENCRYPTION_KEY:dev-only-pii-key-change-me}
      key-version: ${APP_SECURITY_PII_KEY_VERSION:1}
    jwt:
      issuer: ${APP_SECURITY_JWT_ISSUER:gymcrm}
      audience: ${APP_SECURITY_JWT_AUDIENCE:gymcrm-admin}
      access-token-minutes: ${APP_SECURITY_ACCESS_TOKEN_MINUTES:15}
      refresh-token-days: ${APP_SECURITY_REFRESH_TOKEN_DAYS:7}
      secret: ${APP_SECURITY_JWT_SECRET:dev-only-change-me-before-prod}
    dev-admin:
      seed-enabled: ${APP_SECURITY_DEV_ADMIN_SEED_ENABLED:true}
      center-id: ${APP_SECURITY_DEV_ADMIN_CENTER_ID:1}
      login-id: ${APP_SECURITY_DEV_ADMIN_LOGIN_ID:center-admin}
      display-name: ${APP_SECURITY_DEV_ADMIN_DISPLAY_NAME:Center Admin}
      initial-password: ${APP_SECURITY_DEV_ADMIN_INITIAL_PASSWORD:dev-admin-1234!}
  prototype:
    no-auth-enabled: ${APP_PROTOTYPE_NO_AUTH_ENABLED:false}
    allowed-origins: ${APP_PROTOTYPE_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
    default-admin-user-id: ${APP_PROTOTYPE_DEFAULT_ADMIN_USER_ID:1}
    default-admin-username: ${APP_PROTOTYPE_DEFAULT_ADMIN_USERNAME:prototype-admin}

---
spring:
  config:
    activate:
      on-profile: dev
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
app:
  redis:
    enabled: ${APP_REDIS_ENABLED:false}
  prototype:
    no-auth-enabled: ${APP_PROTOTYPE_NO_AUTH_ENABLED:true}

---
spring:
  config:
    activate:
      on-profile: staging
app:
  redis:
    enabled: ${APP_REDIS_ENABLED:false}
  prototype:
    no-auth-enabled: ${APP_PROTOTYPE_NO_AUTH_ENABLED:true}

---
spring:
  config:
    activate:
      on-profile: prod
app:
  redis:
    enabled: ${APP_REDIS_ENABLED:true}
  prototype:
    no-auth-enabled: false
